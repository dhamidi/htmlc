[tools]
go = "latest"

[tasks.build]
description = "Build the docs site with htmlc"
run = """
go install github.com/dhamidi/htmlc/cmd/htmlc@latest
PROPS=$(cat ./pages/_data.json)
mkdir -p ./dist/docs
htmlc page -dir ./pages -props "$PROPS" index > ./dist/index.html
htmlc page -dir ./pages/docs -props "$PROPS" index > ./dist/docs/index.html
htmlc page -dir ./pages/docs -props "$PROPS" cli > ./dist/docs/cli.html
htmlc page -dir ./pages/docs -props "$PROPS" directives > ./dist/docs/directives.html
htmlc page -dir ./pages/docs -props "$PROPS" components > ./dist/docs/components.html
echo "Build complete: 5 pages, 0 errors."
"""

[tasks.dev]
description = "Build and serve with live reload"
run = """
mise run build
"""

[tasks.deploy]
description = "Build and deploy to Cloudflare Pages"
run = """
mise run build
wrangler pages deploy dist --project-name=htmlc-sh --branch=docs
"""
